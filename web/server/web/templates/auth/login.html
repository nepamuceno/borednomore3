<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DESAR — Iniciar Sesión</title>
<link rel="stylesheet" href="/desar/static/css/main.css">
</head>
<body class="login-body">
<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="24" fill="#1565C0"/>
        <path d="M24 12 C18 12 14 16 14 22 C14 26 16 29 20 31 L20 36 L28 36 L28 31 C32 29 34 26 34 22 C34 16 30 12 24 12Z" fill="white" opacity="0.9"/>
        <circle cx="21" cy="20" r="2" fill="#1565C0"/>
        <circle cx="27" cy="20" r="2" fill="#1565C0"/>
      </svg>
    </div>
    <h1>DESAR</h1>
    <p class="login-subtitle">Sistema de Control de Asistencias</p>

    {{if .Error}}
    <div class="alert alert-error">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/desar/login">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required
               placeholder="admin@empresa.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required
               placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        Iniciar Sesión
      </button>
    </form>
    <p class="login-footer">© 2026 zSoft — DESAR v1.0</p>
  </div>
</div>
</body>
</html>
