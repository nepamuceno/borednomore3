<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Usuarios — {{.CompaniaNombre}} — DESAR</title>
<link rel="stylesheet" href="/desar/static/css/main.css">
</head>
<body class="app-body">
<nav class="sidebar">
  <div class="sidebar-logo"><span class="logo-icon">◉</span><span class="logo-text">DESAR</span></div>
  <ul class="sidebar-nav">
    <li><a href="/desar/">📊 Dashboard</a></li>
    <li class="active"><a href="/desar/sa/companias">🏢 Compañías</a></li>
    <li class="sidebar-sep"></li>
    <li><a href="/desar/logout">🚪 Salir</a></li>
  </ul>
</nav>
<main class="main-content">
  <header class="page-header">
    <div>
      <a href="/desar/sa/companias/{{.CompaniaID}}" class="btn btn-secondary" style="margin-bottom:8px">← Volver</a>
      <h1>🔑 Usuarios — {{.CompaniaNombre}}</h1>
    </div>
  </header>

  <div style="display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start">
    <div class="table-container">
      <table class="data-table">
        <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th><th></th></tr></thead>
        <tbody>
          {{range .Usuarios}}
          <tr>
            <td><strong>{{.Nombre}}</strong></td>
            <td>{{.Email}}</td>
            <td><span class="badge-rol badge-rol-{{.Rol}}">{{.Rol}}</span></td>
            <td>{{if .Activo}}<span style="color:#2e7d32">✅ Activo</span>{{else}}<span style="color:#c62828">⛔ Inactivo</span>{{end}}</td>
            <td>
              <button class="btn btn-danger" style="padding:4px 10px;font-size:11px"
                data-delete-url="/desar/sa/companias/{{$.CompaniaID}}/usuarios/{{.ID}}"
                data-confirm="¿Desactivar usuario {{.Email}}?">Desactivar</button>
            </td>
          </tr>
          {{else}}<tr><td colspan="5" class="empty">Sin usuarios</td></tr>
          {{end}}
        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-title">➕ Nuevo Usuario</div>
      <form method="POST" action="/desar/sa/companias/{{.CompaniaID}}/usuarios">
        <div class="form-group"><label>Nombre</label><input type="text" name="nombre" required></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
        <div class="form-group"><label>Contraseña</label><input type="password" name="password" required minlength="8"></div>
        <div class="form-group"><label>Rol</label>
          <select name="rol">
            {{range .Roles}}<option value="{{.}}">{{.}}</option>{{end}}
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Crear usuario</button>
      </form>
    </div>
  </div>
</main>
<script src="/desar/static/js/main.js"></script>
</body></html>
