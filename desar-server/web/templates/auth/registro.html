<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DESAR — Registrar Empresa</title>
<link rel="stylesheet" href="/desar/static/css/main.css">
</head>
<body class="login-body">
<div class="login-container">
  <div class="login-card" style="max-width:480px">
    <div class="login-logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="24" fill="#1565C0"/>
        <path d="M24 12 C18 12 14 16 14 22 C14 26 16 29 20 31 L20 36 L28 36 L28 31 C32 29 34 26 34 22 C34 16 30 12 24 12Z" fill="white" opacity="0.9"/>
      </svg>
    </div>
    <h1>Registrar Empresa</h1>
    <p class="login-subtitle">Plan básico — gratis, hasta 25 empleados</p>

    {{if .Error}}
    <div class="alert alert-error">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/desar/registro">
      <div class="form-group">
        <label>Nombre de la empresa *</label>
        <input type="text" name="nombre_compania" required placeholder="Empresa S.A. de C.V.">
      </div>
      <div class="form-group">
        <label>Tu nombre *</label>
        <input type="text" name="nombre_admin" required placeholder="Juan García">
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" name="email" required placeholder="juan@empresa.com">
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="tel" name="telefono" placeholder="55 1234 5678">
      </div>
      <div class="form-group">
        <label>Contraseña * (mín. 8 caracteres)</label>
        <input type="password" name="password" required placeholder="••••••••" minlength="8">
      </div>
      <div class="form-group">
        <label>Confirmar contraseña *</label>
        <input type="password" name="password2" required placeholder="••••••••" minlength="8">
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        Crear cuenta gratuita
      </button>
    </form>

    <div style="text-align:center;margin-top:16px">
      <a href="/desar/login" style="color:#666;font-size:14px;text-decoration:none">
        ← Volver al inicio de sesión
      </a>
    </div>

    <div style="background:#E3F2FD;border-radius:8px;padding:12px;margin-top:16px;font-size:12px;color:#1565C0">
      ✅ Plan básico incluye: hasta 25 empleados, 3 dispositivos,<br>
      reconocimiento facial, QR, reportes y panel web.
    </div>

    <p class="login-footer">© 2026 zSoft — DESAR v1.0</p>
  </div>
</div>
</body>
</html>
