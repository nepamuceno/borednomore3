<!DOCTYPE html><html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Empleados — {{.CompaniaNombre}}</title>
<link rel="stylesheet" href="/desar/static/css/main.css"></head>
<body class="app-body">
<nav class="sidebar">
  <div class="sidebar-logo"><span class="logo-icon">◉</span><span class="logo-text">DESAR</span></div>
  <ul class="sidebar-nav">
    <li><a href="/desar/">📊 Dashboard</a></li>
    <li class="sidebar-sep"></li>
    <li class="active"><a href="/desar/sa/companias">🏢 Compañías</a></li>
    <li><a href="/desar/logout">🚪 Salir</a></li>
  </ul>
</nav>
<main class="main-content">
  <header class="page-header">
    <div>
      <a href="/desar/sa/companias/{{.CompaniaID}}" class="btn btn-secondary" style="margin-bottom:8px">← {{.CompaniaNombre}}</a>
      <h1>👥 Empleados</h1>
    </div>
    <div style="display:flex;gap:8px">
      <a href="/desar/sa/companias/{{.CompaniaID}}/registros" class="btn btn-secondary">📋 Registros</a>
    </div>
  </header>
  <div class="table-container">
    <table class="data-table">
      <thead><tr><th>Código</th><th>Nombre</th><th>Puesto</th><th>Sitio</th><th>Estado</th><th>Acción</th></tr></thead>
      <tbody>
        {{range .Empleados}}
        <tr>
          <td class="mono">{{.ID}}</td>
          <td><strong>{{.Nombre}}</strong></td>
          <td>{{.Puesto}}</td>
          <td>{{.SitioTrabajo}}</td>
          <td><span class="badge {{if .Activo}}badge-entrada{{else}}badge-salida{{end}}">{{if .Activo}}Activo{{else}}Baja{{end}}</span></td>
          <td>
            <button class="btn btn-danger" style="padding:3px 8px;font-size:11px"
              data-delete-url="/desar/sa/empleados/{{.DBID}}?compania_id={{$.CompaniaID}}"
              data-confirm="¿Eliminar empleado {{.Nombre}}?">Eliminar</button>
          </td>
        </tr>
        {{else}}<tr><td colspan="6" class="empty">Sin empleados</td></tr>
        {{end}}
      </tbody>
    </table>
  </div>
</main>
<script src="/desar/static/js/main.js"></script>
</body></html>
