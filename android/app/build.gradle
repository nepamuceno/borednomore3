plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"   // actualizado
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.zsoft.desar"
    compileSdk 36   // actualizado

    ndkVersion "27.0.12077973"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.zsoft.desar"
        minSdk 26
        targetSdk 36   // actualizado
        versionCode flutter.versionCode
        versionName flutter.versionName
        multiDexEnabled true

        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64"
        }
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            storeFile file("release.keystore")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: "changeme"
            keyAlias System.getenv("KEY_ALIAS") ?: "desar"
            keyPassword System.getenv("KEY_PASSWORD") ?: "changeme"
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            debuggable true
            signingConfig signingConfigs.debug
        }
        profile {
            initWith buildTypes.debug
            applicationIdSuffix ".profile"
            versionNameSuffix "-profile"
            debuggable false
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    splits {
        abi {
            enable true
            reset()
            include "armeabi-v7a", "arm64-v8a", "x86_64"
            universalApk true
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.1.0"   // actualizado
    implementation "androidx.multidex:multidex:2.0.1"
    implementation "androidx.window:window:1.3.0"
    implementation "androidx.window:window-java:1.3.0"
}
